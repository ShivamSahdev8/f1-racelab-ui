<div class="navbar">
  <nav class="nav-inner">

    <a class="brand" routerLink="/">
      <span class="dot"></span>F1 RACELAB
    </a>

    <div class="tabs" #tabsContainer>
      <span class="pill" #pill></span>
      <a class="tab" routerLink="/live" routerLinkActive="active" #tab>Live</a>
      <a class="tab" routerLink="/stats" routerLinkActive="active" #tab>Standings</a>
      <a class="tab" routerLink="/fantasy" routerLinkActive="active" #tab>Fantasy</a>
      <a class="tab" routerLink="/predictor" routerLinkActive="active" #tab>Predictor</a>
      <a class="tab" routerLink="/news" routerLinkActive="active" #tab>News</a>
    </div>

    <!-- User dropdown or enter app -->
<ng-container *ngIf="isLoggedIn$ | async; else loginBtn">
  <div class="user-area" #userArea>
    <button class="nav-enter" (click)="toggleDropdown()">
      {{ (user$ | async)?.name || 'Account' }}
      <span class="caret" [class.open]="showDropdown">▾</span>
    </button>

    <div class="dropdown" *ngIf="showDropdown">
      <div class="dropdown-header">
        <div class="dropdown-avatar">
          {{ ((user$ | async)?.name || 'G')[0] }}
        </div>
        <div class="dropdown-info">
          <span class="dropdown-name">{{ (user$ | async)?.name }}</span>
          <span class="dropdown-team" *ngIf="(user$ | async)?.favouriteTeam">
            <span class="team-dot"></span>
            {{ (user$ | async)?.favouriteTeam }} fan
          </span>
        </div>
      </div>
      <div class="dropdown-divider"></div>
      <button class="dropdown-item" (click)="logout()">
        <span class="item-icon">⏻</span> Sign out
      </button>
    </div>
  </div>
</ng-container>

    <ng-template #loginBtn>
      <a class="nav-enter" routerLink="/auth/login">Sign In</a>
    </ng-template>

  </nav>
</div>
