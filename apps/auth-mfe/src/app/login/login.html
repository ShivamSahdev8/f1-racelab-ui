<div class="login-container">
  <div class="login-card">
    <!-- Logo -->
    <div class="logo">🏎️ F1 RaceLab</div>

    <!-- Success -->
    <ng-container *ngIf="step() === 'success'">
      <h2>Welcome! ✅</h2>
      <p class="subtitle">You are now signed in!</p>
    </ng-container>

    <!-- New Password Required -->
    <ng-container *ngIf="step() === 'new-password'">
      <h2>Set New Password</h2>
      <p class="subtitle">Please set a permanent password</p>

      <div class="error-banner" *ngIf="error()">❌ {{ error() }}</div>

      <div class="form">
        <div class="form-group">
          <label>Your Name</label>
          <input
            type="text"
            [(ngModel)]="name"
            placeholder="John Doe"
            class="input"
            [disabled]="isLoading()"
          />
          <label>New Password</label>
          <input
            type="password"
            [(ngModel)]="newPassword"
            placeholder="••••••••"
            class="input"
            [disabled]="isLoading()"
          />
        </div>

        <button
          class="login-btn"
          (click)="onSetNewPassword()"
          [disabled]="isLoading() || !newPassword"
        >
          {{ isLoading() ? 'Setting password...' : 'Set Password' }}
        </button>
      </div>
    </ng-container>

    <!-- Login Form -->
    <ng-container *ngIf="step() === 'login'">
      <h2>Welcome Back</h2>
      <p class="subtitle">Sign in to your account</p>

      <div class="error-banner" *ngIf="error()">❌ {{ error() }}</div>

      <div class="form">
        <div class="form-group">
          <label>Email</label>
          <input
            type="email"
            [(ngModel)]="email"
            placeholder="your@email.com"
            class="input"
            [disabled]="isLoading()"
          />
        </div>

        <div class="form-group">
          <label>Password</label>
          <input
            type="password"
            [(ngModel)]="password"
            placeholder="••••••••"
            class="input"
            [disabled]="isLoading()"
          />
        </div>

        <button
          class="login-btn"
          (click)="onLogin()"
          [disabled]="isLoading() || !email || !password"
        >
          {{ isLoading() ? 'Signing in...' : 'Sign In' }}
        </button>
      </div>

      <p class="signup-link">
        Don't have an account?
        <a (click)="showSignup()">Sign up</a>
      </p>
    </ng-container>
  </div>
</div>
