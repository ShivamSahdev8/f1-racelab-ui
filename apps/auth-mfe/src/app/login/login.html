<div class="auth-page">

  <!-- Ambient background -->
  <div class="aurora" aria-hidden="true">
    <span class="aurora-a"></span>
    <span class="aurora-b"></span>
  </div>
  <div class="grain" aria-hidden="true"></div>

  <!-- Left panel — branding -->
  <div class="brand-panel">
    <div class="brand-content">
      <div class="brand-logo">
        <span class="dot"></span>F1 RACELAB
      </div>
      <div class="gantry" aria-label="F1 start lights">
        <div class="light-col" *ngFor="let c of [1,2,3,4,5]">
          <span class="bulb lit"></span>
          <span class="bulb lit"></span>
        </div>
      </div>
      <h2 class="brand-headline display">PREDICT<span class="l2">THE RACE.</span></h2>
      <p class="brand-sub">AI-powered race predictions, live timing and F1 strategy — all in one pit wall.</p>
      <div class="brand-chips">
        <span class="chip">🤖 Claude AI</span>
        <span class="chip g">📊 Live F1 data</span>
        <span class="chip p">🔮 Strategy sim</span>
      </div>
    </div>
  </div>

  <!-- Right panel — form -->
  <div class="form-panel">
    <div class="form-card">

      <!-- Header -->
      <div class="form-header">
        <div class="form-eyebrow">Welcome back</div>
        <h1 class="display">Sign In</h1>
        <p class="form-sub">New to RaceLab? <a routerLink="/auth/register" class="link">Create an account</a></p>
      </div>

      <!-- Guest CTA -->
      <button class="guest-btn" (click)="loginAsGuest()" [disabled]="isLoading()">
        <span class="guest-icon">👀</span>
        <div class="guest-text">
          <span class="guest-title">Try as Guest</span>
          <span class="guest-hint">guest&#64;f1racelab.com · no signup needed</span>
        </div>
        <span class="guest-arrow">→</span>
      </button>

      <div class="divider"><span>or sign in with email</span></div>

      <!-- Form -->
      <form (ngSubmit)="onLogin()" #loginForm="ngForm">

        <div class="field">
          <label for="email">Email</label>
          <input
            id="email"
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            [disabled]="isLoading()"/>
        </div>

        <div class="field">
          <label for="password">
            Password
            <a routerLink="/auth/forgot-password" class="link forgot">Forgot password?</a>
          </label>
          <div class="input-wrap">
            <input
              id="password"
              [type]="showPassword() ? 'text' : 'password'"
              [(ngModel)]="password"
              name="password"
              placeholder="••••••••"
              autocomplete="current-password"
              [disabled]="isLoading()"/>
            <button type="button" class="toggle-pw" (click)="togglePassword()" tabindex="-1">
              {{ showPassword() ? '🙈' : '👁️' }}
            </button>
          </div>
        </div>

        <!-- Error -->
        <div class="error-msg" *ngIf="error()">
          <span>⚠️</span> {{ error() }}
        </div>

        <!-- Submit -->
        <button type="submit" class="submit-btn" [disabled]="isLoading()">
          <span *ngIf="!isLoading()">Sign In →</span>
          <span *ngIf="isLoading()" class="spinner">⏳ Signing in...</span>
        </button>

      </form>

    </div>
  </div>
</div>
