<div class="signup-container">
  <div class="signup-card">

    <!-- Logo -->
    <div class="logo">🏎️ F1 RaceLab</div>

    <!-- Success -->
    <ng-container *ngIf="step() === 'success'">
      <div class="success-icon">🎉</div>
      <h2>You're In!</h2>
      <p class="subtitle">Account created successfully!</p>
      <a routerLink="/auth/login" class="login-btn-link">
        <button class="login-btn">Go to Login</button>
      </a>
    </ng-container>

    <!-- Verify Email -->
    <ng-container *ngIf="step() === 'verify'">
      <h2>Verify Email</h2>
      <p class="subtitle">
        We sent a code to <strong>{{ email }}</strong>
      </p>

      <div class="error-banner" *ngIf="error()">
        ❌ {{ error() }}
      </div>

      <div class="form">
        <div class="form-group">
          <label>Verification Code</label>
          <input
            type="text"
            [(ngModel)]="verifyCode"
            placeholder="Enter 6-digit code"
            class="input"
            [disabled]="isLoading()"/>
        </div>

        <button
          class="login-btn"
          (click)="onVerify()"
          [disabled]="isLoading() || !verifyCode">
          {{ isLoading() ? 'Verifying...' : 'Verify Email' }}
        </button>
      </div>
    </ng-container>

    <!-- Register Form -->
    <ng-container *ngIf="step() === 'register'">
      <h2>Create Account</h2>
      <p class="subtitle">Join the F1 RaceLab community</p>

      <div class="error-banner" *ngIf="error()">
        ❌ {{ error() }}
      </div>

      <div class="form">

        <!-- Name -->
        <div class="form-group">
          <label>Full Name</label>
          <input
            type="text"
            [(ngModel)]="name"
            placeholder="John Doe"
            class="input"
            [disabled]="isLoading()"/>
        </div>

        <!-- Email -->
        <div class="form-group">
          <label>Email</label>
          <input
            type="email"
            [(ngModel)]="email"
            placeholder="your@email.com"
            class="input"
            [disabled]="isLoading()"/>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label>Password</label>
          <input
            type="password"
            [(ngModel)]="password"
            placeholder="••••••••"
            class="input"
            [disabled]="isLoading()"/>
        </div>

        <!-- Confirm Password -->
        <div class="form-group">
          <label>Confirm Password</label>
          <input
            type="password"
            [(ngModel)]="confirmPassword"
            placeholder="••••••••"
            class="input"
            [disabled]="isLoading()"/>
        </div>

        <!-- Favourite Team -->
        <div class="form-group">
          <label>Favourite Team</label>
          <div class="teams-grid">
            <div
              class="team-card"
              *ngFor="let team of teams"
              [class.selected]="favouriteTeam === team.name"
              [style.border-color]="favouriteTeam === team.name ? team.color : 'transparent'"
              [style.background]="favouriteTeam === team.name ? team.color + '22' : ''"
              (click)="selectTeam(team.name)">
              <span
                class="team-dot"
                [style.background]="team.color">
              </span>
              <span class="team-name">{{ team.name }}</span>
            </div>
          </div>
        </div>

        <button
          class="login-btn"
          (click)="onRegister()"
          [disabled]="isLoading() || !name || !email || !password || !confirmPassword">
          {{ isLoading() ? 'Creating account...' : 'Create Account' }}
        </button>

      </div>

      <p class="signup-link">
        Already have an account?
        <a routerLink="/auth/login">Sign in</a>
      </p>
    </ng-container>

  </div>
</div>
