<div class="reset-container">
  <div class="reset-card">

    <!-- Logo -->
    <div class="logo">🏎️ F1 RaceLab</div>

    <!-- Success -->
    <ng-container *ngIf="step() === 'success'">
      <div class="success-icon">✅</div>
      <h2>Password Reset!</h2>
      <p class="subtitle">You can now sign in with your new password</p>
      <a routerLink="/login">
        <button class="reset-btn">Go to Login</button>
      </a>
    </ng-container>

    <!-- Enter Code + New Password -->
    <ng-container *ngIf="step() === 'code'">
      <h2>Reset Password</h2>
      <p class="subtitle">
        We sent a code to <strong>{{ email }}</strong>
      </p>

      <div class="error-banner" *ngIf="error()">
        ❌ {{ error() }}
      </div>

      <div class="form">
        <div class="form-group">
          <label>Verification Code</label>
          <input
            type="text"
            [(ngModel)]="code"
            placeholder="Enter 6-digit code"
            class="input"
            [disabled]="isLoading()"/>
        </div>

        <div class="form-group">
          <label>New Password</label>
          <input
            type="password"
            [(ngModel)]="newPassword"
            placeholder="••••••••"
            class="input"
            [disabled]="isLoading()"/>
        </div>

        <div class="form-group">
          <label>Confirm New Password</label>
          <input
            type="password"
            [(ngModel)]="confirmPassword"
            placeholder="••••••••"
            class="input"
            [disabled]="isLoading()"/>
        </div>

        <button
          class="reset-btn"
          (click)="onResetPassword()"
          [disabled]="isLoading() || !code || !newPassword || !confirmPassword">
          {{ isLoading() ? 'Resetting...' : 'Reset Password' }}
        </button>
      </div>
    </ng-container>

    <!-- Enter Email -->
    <ng-container *ngIf="step() === 'email'">
      <h2>Forgot Password?</h2>
      <p class="subtitle">Enter your email and we'll send a reset code</p>

      <div class="error-banner" *ngIf="error()">
        ❌ {{ error() }}
      </div>

      <div class="form">
        <div class="form-group">
          <label>Email</label>
          <input
            type="email"
            [(ngModel)]="email"
            placeholder="your@email.com"
            class="input"
            [disabled]="isLoading()"/>
        </div>

        <button
          class="reset-btn"
          (click)="onSendCode()"
          [disabled]="isLoading() || !email">
          {{ isLoading() ? 'Sending code...' : 'Send Reset Code' }}
        </button>
      </div>

      <p class="back-link">
        Back to <a routerLink="/auth/login">Sign in</a>
      </p>
    </ng-container>

  </div>
</div>
